<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lobstr</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <h1>Lobstr</h1>
    <nav class="tabs">
      <button class="tab active" data-tab="identity">Identity</button>
      <button class="tab" data-tab="relays">Relays</button>
      <button class="tab" data-tab="permissions">Permissions</button>
    </nav>
  </header>

  <main>

    <!-- ── Identity ── -->
    <section id="tab-identity">

      <div class="field-group">
        <label for="pubkey-display">Public key</label>
        <div class="input-row">
          <input id="pubkey-display" type="text" readonly placeholder="No identity yet">
          <button id="copy-pubkey-btn">Copy</button>
        </div>
      </div>

      <details id="privkey-section">
        <summary>Private key</summary>
        <div class="field-group" style="margin-top:0.6rem;">
          <div class="warning">Never share your private key with anyone.</div>
          <div id="privkey-display-wrapper" hidden>
            <label style="margin-top:0.4rem;">Generated private key — copy and store it safely</label>
            <div class="input-row" style="margin-top:0.3rem;">
              <input id="privkey-display" type="text" readonly>
              <button id="copy-privkey-btn">Copy</button>
            </div>
          </div>
          <div class="input-row" style="margin-top:0.4rem;">
            <input id="privkey-import" type="password" placeholder="Paste 64-char hex private key" autocomplete="off">
            <button id="import-btn">Import</button>
          </div>
          <div id="import-error" class="error" hidden></div>
        </div>
      </details>

      <details id="mnemonic-section">
        <summary>Mnemonic seed phrase</summary>
        <div class="field-group" style="margin-top:0.6rem;">
          <div id="mnemonic-display-wrapper" hidden>
            <div class="warning">Write down these words and keep them safe. They cannot be recovered.</div>
            <div id="mnemonic-display" class="mnemonic-grid"></div>
            <button id="copy-mnemonic-btn" style="margin-top:0.4rem;">Copy words</button>
          </div>
          <label style="margin-top:0.4rem;">Import from mnemonic</label>
          <textarea id="mnemonic-import" rows="2" placeholder="Enter 12 or 24 words separated by spaces"></textarea>
          <div id="mnemonic-error" class="error" hidden></div>
          <button id="mnemonic-import-btn">Import mnemonic</button>
        </div>
      </details>

      <div class="btn-row">
        <button id="generate-btn" class="primary">Generate keypair</button>
        <select id="mnemonic-strength">
          <option value="128">12 words</option>
          <option value="256">24 words</option>
        </select>
        <button id="generate-mnemonic-btn">From mnemonic</button>
      </div>

      <div class="btn-row">
        <button id="logout-btn" hidden>Logout</button>
      </div>

    </section>

    <!-- ── Relays ── -->
    <section id="tab-relays" hidden>
      <div class="input-row">
        <input id="relay-input" type="text" placeholder="wss://relay.example.com" autocomplete="off">
        <button id="relay-add-btn">Add</button>
      </div>
      <div id="relay-error" class="error" hidden></div>
      <div id="relay-list"></div>
    </section>

    <!-- ── Permissions ── -->
    <section id="tab-permissions" hidden>
      <p id="permissions-empty" class="muted">No site permissions yet.</p>
      <div id="permissions-list"></div>
    </section>

  </main>

  <script type="module" src="popup.js"></script>
</body>
</html>
