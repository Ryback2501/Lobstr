name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

jobs:
  read-version:
    name: Read version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v6
      - name: Read version
        id: version
        run: |
          VERSION=$(grep -oP "(?<=')[0-9]+\.[0-9]+\.[0-9]+(?=')" swa/version.js)
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $VERSION"

  create-tag:
    name: Create version tag
    needs: [read-version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Create and push tag
        run: |
          VERSION="${{ needs.read-version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

  create-artifacts:
    name: Create zip artifacts
    needs: [read-version]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Zip SWA and browser extension
        run: |
          VERSION="${{ needs.read-version.outputs.version }}"
          cd swa && zip -r "../swa-${VERSION}.zip" . -x "*.test.js" && cd ..
          cd browser && zip -r "../browser-${VERSION}.zip" . -x "*.test.js" && cd ..
      - uses: actions/upload-artifact@v7
        with:
          name: release-artifacts
          path: |
            swa-*.zip
            browser-*.zip
          retention-days: 1

  docker-publish:
    name: Publish Docker image
    needs: [read-version, create-tag]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push image
        run: |
          VERSION="${{ needs.read-version.outputs.version }}"
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/lobstr"
          docker build -t "${IMAGE}:${VERSION}" -t "${IMAGE}:latest" .
          docker push "${IMAGE}:${VERSION}"
          docker push "${IMAGE}:latest"

  github-release:
    name: Create GitHub release
    needs: [read-version, create-tag, create-artifacts]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: release-artifacts
      - name: Create release with artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.read-version.outputs.version }}"
          gh release create "v${VERSION}" \
            --generate-notes \
            --title "v${VERSION}" \
            "swa-${VERSION}.zip" \
            "browser-${VERSION}.zip"

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: [github-release]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/configure-pages@v6
      - name: Prepare pages artifact
        run: cp -r swa _site && find _site -name "*.test.js" -delete
      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./_site
      - uses: actions/deploy-pages@v5
        id: deployment
