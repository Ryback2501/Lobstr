name: CI jobs

on:
  workflow_call:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint JS files
        run: |
          npx --yes eslint@8 \
            --ignore-pattern "swa/vendor/**" \
            --ignore-pattern "browser/vendor/**" \
            "swa/**/*.js" "browser/**/*.js"

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run unit tests
        run: |
          FILES=$(find swa browser -name "*.test.js" 2>/dev/null | tr '\n' ' ')
          if [ -z "$FILES" ]; then
            echo "No test files found — skipping."
            exit 0
          fi
          node --test $FILES

  docker-smoke:
    name: Docker smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build nginx image
        run: docker build -t lobstr-swa:ci .
      - name: Start container
        run: docker run -d --name lobstr-ci -p 8080:80 lobstr-swa:ci
      - name: Wait for nginx
        run: |
          for i in $(seq 1 10); do
            curl -sf http://localhost:8080/ && break
            sleep 1
          done
      - name: Smoke test — expect HTTP 200
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" http://localhost:8080/)
          [ "$STATUS" = "200" ] || { echo "Got HTTP $STATUS"; exit 1; }
      - name: Stop container
        if: always()
        run: docker rm -f lobstr-ci
